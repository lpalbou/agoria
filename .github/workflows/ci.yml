name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Create environment (${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install (with dev + mcp extras)
        run: uv pip install -e ".[dev,mcp]"
      - name: Run tests
        run: uv run pytest -q
