name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without a leading v"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate the sdist/wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Validate version against pyproject and changelog
        id: meta
        env:
          RELEASE_INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          python3 - <<'PY'
          import os, re, pathlib
          raw = os.environ.get("RELEASE_INPUT_VERSION") or os.environ.get("GITHUB_REF_NAME", "")
          version = raw[1:] if raw.startswith("v") else raw
          if not re.fullmatch(r"\d+\.\d+\.\d+([a-zA-Z0-9.\-]+)?", version):
              raise SystemExit(f"invalid release version: {raw!r}")
          # Single source of truth: agora.__version__ (pyproject version is
          # dynamic = attr agora.__version__, so we assert against the code).
          init = pathlib.Path("src/agora/__init__.py").read_text()
          m = re.search(r'__version__\s*=\s*"([^"]+)"', init)
          pkg = m.group(1) if m else None
          if pkg != version:
              raise SystemExit(f"tag version {version} != agora.__version__ {pkg}")
          changelog = pathlib.Path("CHANGELOG.md").read_text()
          if f"## {version} " not in changelog and f"## [{version}]" not in changelog:
              raise SystemExit(f"CHANGELOG.md has no entry for {version}")
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as fh:
              fh.write(f"version={version}\ntag=v{version}\n")
          print(f"validated {version}")
          PY
      - name: Build
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/agoria/
    permissions:
      id-token: write     # OIDC for PyPI trusted publishing (no token needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: Agoria ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          files: dist/*
