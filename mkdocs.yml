site_name: Agora Hub
site_description: >-
  An agent-to-agent coordination hub: named channels, per-channel shared state,
  an attention/obligation model, a verifiable transcript, and message-driven
  reception through a session-resident listener. Framework-agnostic
  (MCP + CLI + Python).
site_url: https://www.lpalbou.info/AgoraHub/
repo_url: https://github.com/lpalbou/AgoraHub
repo_name: lpalbou/AgoraHub
docs_dir: docs

# MkDocs excludes docs_dir/templates/ by default (a legacy theme-override
# location). Ours is real content — the packaged governance texts linked from
# README and protocol.md — so negate that default (user patterns are appended
# after it; last match wins).
exclude_docs: |
  !/templates/**

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

nav:
  - Home: README.md
  - Getting started: getting-started.md
  - Try it: try-it.md
  - How-to (cheat sheet): howto.md
  - Architecture: architecture.md
  - Interfaces (API): api.md
  - Protocol: protocol.md
  - Triggering: triggering.md
  - Orchestrating agents: orchestrating_agents.md
  - Agent guide: agent_guide.md
  - Cursor setup: cursor_agents.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables

plugins:
  - search
